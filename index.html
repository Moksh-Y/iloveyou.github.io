<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>happy 2 year anniversery babe (one month)</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div id="floating-pics-container"></div>

    <!-- Foreground Static Props -->
    <div id="foreground-props-container">
        <!-- Tree in the bottom left -->
        <div class="static-prop tree-prop">
            <div class="prop-emoji">🌳</div>
            <div id="tree-pics"></div>
        </div>
    </div>

    <!-- PAGE 1: Lemon and Salt -->
    <div id="page1" class="page active">
        <h1>happy one month anniversery princess</h1>
        <p class="instruction">Salt da lemon</p>
        <div class="interaction-area">
            <div id="lemon">🍋</div>
            <div id="salt-shaker" draggable="false">🧂</div>
        </div>
        <div class="progress-bar-container"><div id="salt-progress"></div></div>
    </div>

    <!-- PAGE 2: Rasmalai -->
    <div id="page2" class="page hidden">
        <h1>I love you so much and I do not know how it feels like we've been together for years already</h1>
        <p class="instruction">Virtual rasmalai for you</p>
        <div class="interaction-area">
            <div id="rasmalai-container">
                <img src="rasmalai.png" alt="Delicious Rasmalai" id="rasmalai-img" onerror="this.alt='(Rasmalai image goes here)'">
            </div>
        </div>
    </div>

    <!-- PAGE 3: Word Cloud -->
    <div id="page3" class="page hidden">
        <h2>30 things I love about you for 30 days together</h2>
        <p class="instruction">Mwah the words</p>
        <div id="word-cloud" class="cloud-container">
        </div>
        <h3 class="signature">- your mogu mogu</h3>
    </div>

    <div id="meme-overlay" class="hidden">
        <img src="67meme.gif" alt="67 Meme" id="meme-img" onerror="this.alt='(67 Meme GIF goes here)'">
        <audio id="meme-audio" src="67meme.mp3"></audio>
    </div>

    <div id="explosion-overlay" class="hidden"></div>

    <div id="reason-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h3 id="modal-word" class="word-title">Word</h3>
            <p id="modal-text">Reason goes here</p>
        </div>
    </div>

    <!-- Audio files -->
    <audio id="meme-audio" src="67meme.mp3"></audio>
    <audio id="chomp-audio" src="chomp.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
